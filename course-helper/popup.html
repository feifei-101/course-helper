<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;color:#1a1a1a;background:#f0f2f5}
.header{background:linear-gradient(135deg,#4a6cf7,#6c5ce7);color:#fff;padding:8px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0}
.content{padding:8px 10px}
.card{background:#fff;border-radius:8px;padding:8px 12px;margin-bottom:5px;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
.row{display:flex;justify-content:space-between;align-items:center;min-height:26px}
.row+.row{margin-top:4px;padding-top:4px;border-top:1px solid #f0f0f0}
.stat{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
.dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0}


.switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0;cursor:pointer}
.switch input{opacity:0;width:0;height:0}
.switch .track{position:absolute;inset:0;border-radius:20px;background:#ccc;transition:.25s}
.switch .thumb{position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
.switch input:checked+.track{background:#4a6cf7}
.switch input:checked~.thumb{left:19px}


.speed-group{display:flex;gap:4px;flex:1;max-width:130px}
.speed-btn{padding:2px 10px;border:1px solid #ddd;border-radius:4px;font-size:11px;cursor:pointer;background:#f5f5f5;color:#555;flex:1;text-align:center}
.speed-btn.active{background:#4a6cf7;color:#fff;border-color:#4a6cf7}


.api-row{font-size:11px;cursor:pointer;padding:3px 0;display:flex;align-items:center;gap:4px}
.api-drawer{display:none;margin-top:5px;padding-top:5px;border-top:1px solid #eee}
.api-input{width:100%;padding:5px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:11px;outline:none;font-family:monospace}
.api-input:focus{border-color:#4a6cf7}
.api-actions{display:flex;gap:4px;margin-top:4px}
.api-btn{padding:3px 8px;border:none;border-radius:4px;font-size:10px;cursor:pointer;color:#fff}
.api-btn.save{background:#4a6cf7}
.api-btn.test{background:#6b7280}
.api-btn.del{background:#ef4444}
</style></head>
<body>
<div class="header"><span style="display:flex;align-items:center;gap:5px"><span class="dot" id="popupDot" style="background:#aaa"></span> 狒狒助手</span><span id="popupTime" style="font-size:11px;font-weight:400;opacity:.8"></span></div>
<div class="content">

  <div class="card">
    <div class="row">
      <span class="stat"><span class="dot" id="popupStatusDot"></span><span id="popupStatusText">检测中...</span></span>
      <label class="switch"><input id="popupToggle" type="checkbox"><span class="track"></span><span class="thumb"></span></label>
    </div>
  </div>

  <div class="card">
    <div class="row"><span style="font-size:12px">⏩ 倍速</span><div class="speed-group" id="popupSpeedGroup">
      <button class="speed-btn active" data-speed="1">1x</button>
      <button class="speed-btn" data-speed="1.5">1.5x</button>
      <button class="speed-btn" data-speed="2">2x</button>
    </div></div>
    <div class="row"><span style="font-size:11px;color:#888">📊 今日进度</span><span id="popupProgress" style="font-size:11px;color:#888">加载中...</span></div>
  </div>

  <div class="card">
    <div class="api-row" id="popupApiRow"><span>🔑</span><span id="popupApiStatus">检测中...</span><span style="flex:1"></span><span style="font-size:10px;color:#999">▼</span></div>
    <div class="api-drawer" id="popupApiDrawer">
      <input class="api-input" id="popupApiInput" type="password" placeholder="输入 DeepSeek API Key (sk-...)" autocomplete="off">
      <div class="api-actions">
        <button class="api-btn save" id="popupApiSave">💾 保存</button>
        <button class="api-btn test" id="popupApiTest">📡 测试</button>
        <button class="api-btn del" id="popupApiDel">🗑 删除</button>
      </div>
    </div>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
